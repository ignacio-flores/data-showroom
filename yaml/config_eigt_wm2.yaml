#define data source
data.file: "data/eigt_wm_ready.qs"

#define plot type 
gopts: 
  - "bar"
  - "hbar"
  - "animate"
  
axis_vars:
  y_axis: 
    var: "value"
    label: ""  
  x_axis: 
    var: "GEO_long"
    label: ""
    
#Define main selector 
fixed_selectors:
  d4_concept_lab: 
    label: "Select Tax Feature"
    selected: "Total Revenue from Tax as % of Gross Domestic Product"
    choices:
      - "Tax Indicator"
      - "Top Marginal Rate"
      - "Exemption Threshold"
      - "Total Revenue from Tax"
      - "Total Revenue from Tax as % of Total Tax Revenue"
      - "Total Revenue from Tax as % of Gross Domestic Product"
  xrate_lab:
    label: "Currency & Price Adjustment"
    selected: "Euro adjusting for inflation"
    choices:
      - "National Currency"
      - "National Currency adjusting for inflation"
      - "USD"
      - "USD adjusting for inflation"
      - "Euro"
      - "Euro adjusting for inflation"
      - "Yuan"
      - "Yuan adjusting for inflation"
      - "PPP USD"
      - "PPP Euro"
      - "PPP Yuan"
  show_zero:
    label: "Show Zero"
    hidden: True
    selected: "No"
    choices:
      - "Yes"
      - "No"

loose_selectors: 
  year:
    label: "Year"
    type: "checkbox"
  GEO_long: 
    label: "Countries" 
    type: "checkbox"
  d2_sector_lab: 
    label: "Type of Tax"
    type: "selector"
  
#define the columns of the data table widget 
dt.cols: 
  GEO_long: "Country name"
  GEO: "Country code"
  year: "Year"
  d4_concept_lab: "Variable"
  d2_sector_lab: "Type of tax"
  xrate_lab: "Currency & price adjustment"
  value: "Value"
  
tooltip_vars:
  d4_concept_lab: "Tax feature:"
  d2_sector_lab: "Type of tax:"
  GEO_long: "Country:"
  year: "Year:"
  xrate_lab: "Currency & price adjustment:"
  value: "Value: "

#other options 
download.button: True
hide.selectors: False
listen: False
table.display: True
hide.legend: True
plot_height: 700
