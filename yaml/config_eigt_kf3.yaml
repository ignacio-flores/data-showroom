#define data source
data.file: "data/eigt_warehouse_meta_v2.csv"
data.wrangler: "custom_code/data_prep_eigt3.R"
keep.col:
  - "GEO"
  - "GEO_long"
  - "d4_concept_lab"
  - "value"

#define plot type
gopts: "point"

scatter_options:
  enabled: true
  show_labels: true
  x_scale_selector: true
  monetary_axes_use_usd_2023: true

#define main plot variables
axis_vars:
  x_axis:
    var: "total_revenue_from_tax_as_percent_of_total_tax_revenue"
    choices: c("top_marginal_rate", "exemption_threshold", "total_revenue_from_tax", "total_revenue_from_tax_as_percent_of_total_tax_revenue", "total_revenue_from_tax_as_percent_of_gross_domestic_product")
    alt.names: c("Top Marginal Rates", "Exemption Thresholds (2023 USD millions)", "EIG Tax Revenue (2023 USD millions)", "EIG Tax % Total Tax Revenue", "EIG Tax % GDP")
    label: "X Axis"
    breaks: 10
  y_axis:
    var: "top_marginal_rate"
    choices: c("top_marginal_rate", "exemption_threshold", "total_revenue_from_tax", "total_revenue_from_tax_as_percent_of_total_tax_revenue", "total_revenue_from_tax_as_percent_of_gross_domestic_product")
    alt.names: c("Top Marginal Rates", "Exemption Thresholds (2023 USD millions)", "EIG Tax Revenue (2023 USD millions)", "EIG Tax % Total Tax Revenue", "EIG Tax % GDP")
    label: "Y Axis"

color:
  var: "geo_long"
  label: "Country"
  style: "dichromat::DarkRedtoBlue_12"
  group:
    - "geo_long"

#Define main selector
fixed_selectors:
  year:
    label: "Year"
    selected: 2022

loose_selectors:
  geo_long:
    label: "Country"
    type: "checkbox"
  d2_sector_lab:
    label: "Type of Tax"
    type: "selector" 
    selected: "Gift Tax for Spouse"   


#define the columns of the data table widget
dt.cols:
  geo_long: "Country"
  year: "Year"
  d2_sector_lab: "Type of Tax"
  top_marginal_rate: "Top Marginal Rates"
  exemption_threshold: "Exemption Thresholds (2023 USD millions)"
  total_revenue_from_tax: "EIG Tax Revenue (2023 USD millions)"
  total_revenue_from_tax_as_percent_of_total_tax_revenue: "EIG Tax % Total Tax Revenue"
  total_revenue_from_tax_as_percent_of_gross_domestic_product: "EIG Tax % GDP"

#define the information shown in the tooltip
tooltip_vars:
  geo_long: "Country:"
  year: "Year:"
  d2_sector_lab: "Type of Tax:"
  top_marginal_rate: "Top Marginal Rates:"
  exemption_threshold: "Exemption Thresholds (2023 USD millions):"
  total_revenue_from_tax: "EIG Tax Revenue (2023 USD millions):"
  total_revenue_from_tax_as_percent_of_total_tax_revenue: "EIG Tax % Total Tax Revenue:"
  total_revenue_from_tax_as_percent_of_gross_domestic_product: "EIG Tax % GDP:"

#other options
download.button: True
hide.selectors: False
listen: False
table.display: True
hide.legend: True
plot_height: 700
